name: appantibloqueo
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ">=3.3.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.7
  google_mobile_ads: ^5.2.0
  provider: ^6.1.2
  http: ^1.1.0
  xml: ^6.5.0
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  image: ^4.7.2
  path_provider: ^2.1.4
  flutter_gif: ^0.0.4
  just_audio: ^0.9.40+1
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
