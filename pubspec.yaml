  flutter_local_notifications: ^19.4.2
  flutter_app_badger:
    path: third_party/flutter_app_badger
  shared_preferences: ^2.5.3
  timezone: ^0.10.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
flutter:
